<!DOCTYPE html>
<html>
<head>
  <title>ByteDrop</title>
  <link rel="icon" type="image/png" href="/ByteDrop.png">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #0f0f0f;
      color: #eee;
      font-family: sans-serif;
      text-align: center;
    }

    button {
        background: #ff3b3b;
        border: none;
        color: white; 
        padding: 6px 10px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        font-size: 14px;
    }

    h2 {
      margin-top: 20px;
    }

    #qrBox img {
      margin: 10px;
      border-radius: 10px;
    }

    #drop {
      border: 2px dashed #444;
      padding: 40px;
      margin: 20px;
      border-radius: 12px;
      background: #1a1a1a;
    }

    #files {
      background: #0f0f0f;
      padding: 20px;
      border-radius: 12px;
      margin: 20px;
    }

    a {
      color: #4fc3f7;
      display: block;
      margin: 8px;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .file-card {
        margin: 6px auto;
        padding: 15px 20px;
        width: 40%;
        border-width: 1px;
        border-radius: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 0 0 6px #eaeaea; /* outer white border effect */
    }

    .file-card span {
        color: #ffffff;
        font-size: 20px;
        cursor: pointer;
    }

    .file-card span:hover {
        text-decoration: underline;
    }
    
    .file-card span {
        max-width: 70%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }

  </style>
</head>
<body>

    <img src="/ByteDrop-logo.png" alt="Byte-Drop Logo" width="350"/> 

<div id="qrBox"></div>
<p id="link"></p>

<div id="drop">Drag & Drop Files</div>

<div id="files"></div>

<script>
fetch("/qr")
  .then(res => res.json())
  .then(data => {
    document.getElementById("qrBox").innerHTML =
      `<img src="${data.qr}" width="200"/>`;

    document.getElementById("link").innerText = data.url;
  });

const drop = document.getElementById("drop");

drop.ondragover = e => e.preventDefault();

drop.ondrop = e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  const form = new FormData();
  form.append("file", file);

  fetch("/upload", {
    method: "POST",
    body: form
  }).then(loadFiles);
};

function loadFiles() {
  fetch("/files")
    .then(res => res.json())
    .then(files => {
      const list = document.getElementById("files");
      list.innerHTML = "";

      files.forEach(f => {
        list.innerHTML += `
          <div class="file-card">
            <span onclick="downloadFile('${f}')">${f}</span>
            <button onclick="deleteFile('${f}')">X</button>
          </div>
        `;
      });
    });
}

function downloadFile(name) {
  window.location.href = "/download/" + name;
}

function deleteFile(name) {
  fetch("/delete/" + name, {
    method: "DELETE"
  }).then(loadFiles);
}

setInterval(loadFiles, 2000);
loadFiles();

// Prevent default behavior
window.addEventListener("dragover", e => e.preventDefault());

window.addEventListener("drop", e => {
  e.preventDefault(); // important

  const file = e.dataTransfer.files[0];
  if (!file) return;

  const form = new FormData();
  form.append("file", file);

  fetch("/upload", {
    method: "POST",
    body: form
  }).then(loadFiles);
});
</script>

</body>
</html>
